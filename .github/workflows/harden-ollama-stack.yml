name: Harden Ollama Stack

on:
  workflow_dispatch:
    inputs:
      vps_host:
        description: VPS publica donde corre Ollama
        required: false
        default: "72.62.169.135"
      vps_user:
        description: Usuario SSH
        required: false
        default: "root"
      ollama_model:
        description: Modelo a dejar instalado y sincronizado
        required: false
        default: "llama3.2:latest"

permissions:
  contents: read

jobs:
  harden:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: srv-d6tg9i7diees73curoc0
      VPS_HOST: ${{ inputs.vps_host }}
      VPS_USER: ${{ inputs.vps_user }}
      OLLAMA_MODEL: ${{ inputs.ollama_model }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Falta el secret RENDER_API_KEY en GitHub Actions."
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ] && [ -z "$VPS_SSH_PASSWORD" ]; then
            echo "Falta auth SSH: configura VPS_SSH_KEY o VPS_SSH_PASSWORD."
            exit 1
          fi

      - name: Prepare SSH auth
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$VPS_SSH_KEY" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_vps_workflow
            chmod 600 ~/.ssh/id_vps_workflow
          elif [ -n "$VPS_SSH_PASSWORD" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi

      - name: Trust VPS host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Harden VPS proxy
        id: harden
        shell: bash
        run: |
          if [ -n "$VPS_SSH_KEY" ]; then
            OUTPUT=$(PUBLIC_HOST="$VPS_HOST" OLLAMA_MODEL="$OLLAMA_MODEL" ssh -i ~/.ssh/id_vps_workflow -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" 'bash -s --' < scripts/harden-ollama-proxy.sh)
          else
            OUTPUT=$(PUBLIC_HOST="$VPS_HOST" OLLAMA_MODEL="$OLLAMA_MODEL" sshpass -p "$VPS_SSH_PASSWORD" ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no "$VPS_USER@$VPS_HOST" 'bash -s --' < scripts/harden-ollama-proxy.sh)
          fi
          echo "$OUTPUT"
          JSON_LINE=$(echo "$OUTPUT" | tail -n 1)
          {
            echo 'json<<EOF'
            echo "$JSON_LINE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Sync Render env vars
        shell: bash
        run: |
          JSON='${{ steps.harden.outputs.json }}'
          HOST=$(node -e "const v = JSON.parse(process.argv[1]); process.stdout.write(v.ollamaHost);" "$JSON")
          TOKEN=$(node -e "const v = JSON.parse(process.argv[1]); process.stdout.write(v.ollamaApiKey);" "$JSON")
          MODEL=$(node -e "const v = JSON.parse(process.argv[1]); process.stdout.write(v.ollamaModel);" "$JSON")
          node scripts/render-maintenance.mjs set-ollama-connection --host "$HOST" --api-key "$TOKEN" --model "$MODEL"

      - name: Summary
        run: echo "Hardening aplicado en VPS y variables de Render sincronizadas."
