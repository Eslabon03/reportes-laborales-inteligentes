name: Harden Ollama Stack

on:
  workflow_dispatch:
    inputs:
      vps_host:
        description: VPS publica donde corre Ollama
        required: false
        default: "72.62.169.135"
      vps_user:
        description: Usuario SSH
        required: false
        default: "root"
      ollama_model:
        description: Modelo a dejar instalado y sincronizado
        required: false
        default: "llama3.2:latest"

permissions:
  contents: read

jobs:
  harden:
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.VPS_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: srv-d6tg9i7diees73curoc0
      VPS_HOST: ${{ inputs.vps_host }}
      VPS_USER: ${{ inputs.vps_user }}
      OLLAMA_MODEL: ${{ inputs.ollama_model }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Harden VPS proxy
        id: harden
        shell: bash
        run: |
          OUTPUT=$(PUBLIC_HOST="$VPS_HOST" OLLAMA_MODEL="$OLLAMA_MODEL" ssh "$VPS_USER@$VPS_HOST" 'bash -s --' < scripts/harden-ollama-proxy.sh)
          echo "$OUTPUT"
          JSON_LINE=$(echo "$OUTPUT" | tail -n 1)
          {
            echo 'json<<EOF'
            echo "$JSON_LINE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Sync Render env vars
        shell: bash
        run: |
          JSON='${{ steps.harden.outputs.json }}'
          HOST=$(node -e "const v = JSON.parse(process.argv[1]); process.stdout.write(v.ollamaHost);" "$JSON")
          TOKEN=$(node -e "const v = JSON.parse(process.argv[1]); process.stdout.write(v.ollamaApiKey);" "$JSON")
          MODEL=$(node -e "const v = JSON.parse(process.argv[1]); process.stdout.write(v.ollamaModel);" "$JSON")
          node scripts/render-maintenance.mjs set-ollama-connection --host "$HOST" --api-key "$TOKEN" --model "$MODEL"

      - name: Summary
        run: echo "Hardening aplicado en VPS y variables de Render sincronizadas."
