name: Rotate SESSION_SECRET

on:
  schedule:
    - cron: "0 9 1 * *"   # 1ro de cada mes a las 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: srv-d6tg9i7diees73curoc0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Render secret
        shell: bash
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "Falta el secret RENDER_API_KEY en GitHub Actions."
            exit 1
          fi

      - name: Rotate SESSION_SECRET in Render
        run: node scripts/render-maintenance.mjs rotate-session-secret

      - name: Summary
        run: echo "SESSION_SECRET rotado. Render redeployara automaticamente."
