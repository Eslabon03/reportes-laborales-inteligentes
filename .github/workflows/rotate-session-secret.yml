name: Rotate SESSION_SECRET

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    if: ${{ secrets.RENDER_API_KEY != '' }}
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: srv-d6tg9i7diees73curoc0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rotate SESSION_SECRET in Render
        run: node scripts/render-maintenance.mjs rotate-session-secretname: Rotate Render Session Secret

on:
  schedule:
    - cron: "30 5 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    if: ${{ secrets.RENDER_API_KEY != '' }}
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: srv-d6tg9i7diees73curoc0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rotate secret in Render
        run: node scripts/render-maintenance.mjs rotate-session-secret

      - name: Summary
        run: echo "SESSION_SECRET rotado. Render debe iniciar un redeploy automaticamente."
