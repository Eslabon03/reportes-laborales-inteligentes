name: Production Health Check

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production checks
        id: health
        continue-on-error: true
        env:
          APP_URL: https://reportes-laborales-inteligentes.onrender.com
          OLLAMA_HOST: ${{ vars.OLLAMA_HEALTH_HOST || 'http://72.62.169.135:11435' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || '' }}
        run: pnpm check:prod

      - name: Open or update incident issue
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[ops] Production health check failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.data.find((issue) => issue.title === title);
            const body = `Fallo el health check automatico.\n\nRun: ${runUrl}`;

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Close open incident issue
        if: steps.health.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[ops] Production health check failed';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.data.find((issue) => issue.title === title);

            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: 'El health check volvio a pasar correctamente. Se cierra el incidente.',
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });

      - name: Fail workflow on health error
        if: steps.health.outcome == 'failure'
        run: exit 1
