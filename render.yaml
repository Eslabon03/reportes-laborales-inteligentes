services:
  - type: web
    name: reportes-laborales-inteligentes
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: corepack enable && pnpm exec next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: SESSION_SECRET
        generateValue: true
      - key: REPORT_OWNER_EMAIL
        sync: false
      - key: SQLITE_DB_PATH
        value: /var/data/reportes.db
      - key: OLLAMA_HOST
        value: http://72.62.169.135:11434
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2:latest
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
